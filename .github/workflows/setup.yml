name: Distribution

on:
  push:
    branches-ignore:
    - renovate/**
    - dependabot/**
    tags:
    - '*'
  pull_request:

permissions:
  contents: read

jobs:
  setup:

    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        persist-credentials: false
    - name: Set up Python
      uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
      with:
        python-version: 3.14
    - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
      with:
        enable-cache: false
        version: 0.11.29
    - name: Install apt dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgettextpo-dev pandoc
    - name: Convert release notes
      if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/')
      env:
        VERSION: ${{ github.ref_name }}
      run: |
        RELEASE_NOTES="docs/releases/${VERSION}.rst"
        if [ ! -f "$RELEASE_NOTES" ]; then
          echo "Release notes not found: $RELEASE_NOTES" >&2
          exit 1
        fi
        mkdir -p release-notes
        RELEASE_NOTES_BODY="$(mktemp)"
        pandoc --from rst --to gfm --output "$RELEASE_NOTES_BODY" "$RELEASE_NOTES"
        sed '1{/^# Translate Toolkit /{N;d;}}' "$RELEASE_NOTES_BODY" > "release-notes/${VERSION}.md"
    - name: Build package
      run: uv build
    - name: Twine check
      run: uvx twine check dist/*
    - name: pydistcheck
      run: uvx pydistcheck --inspect dist/*
    - name: pyroma
      run: uvx --with pip pyroma dist/*.tar.gz
    - name: check-wheel-contents
      run: uvx check-wheel-contents dist/*.whl
    - name: check-manifest
      run: uvx --with pip check-manifest -v
    - name: Install test (source)
      run: |
        uv venv test-ttk-release-src
        . ./test-ttk-release-src/bin/activate
        uv pip install dist/translate_toolkit-*.tar.gz
        moz2po --help
        python ./test-ttk-release-src/lib/python*/site-packages/translate/lang/identify.py README.rst
    - name: Install test (wheel)
      run: |
        uv venv test-ttk-release-whl
        . ./test-ttk-release-whl/bin/activate
        uv pip install dist/translate_toolkit*.whl
        moz2po --help
        python ./test-ttk-release-whl/lib/python*/site-packages/translate/lang/identify.py README.rst
    - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        name: setup
        token: ${{ secrets.CODECOV_TOKEN }} # zizmor: ignore[secrets-outside-env]
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        path: dist/*
        name: dist
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/')
      with:
        path: release-notes/*.md
        name: release-notes

  pypi-publish:
    if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/')
    needs:
    - setup
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      # this permission is mandatory for trusted publishing
      id-token: write
    steps:
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: dist
        path: dist

    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1

  github-publish:
    if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/')
    needs:
    - setup
    runs-on: ubuntu-24.04
    permissions:
      # this permission is mandatory for creating a release
      contents: write
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        persist-credentials: false
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: dist
        path: dist
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: release-notes
        path: release-notes
    - env:
        VERSION: ${{ github.ref_name }}
        GH_TOKEN: ${{ github.token }}
      run: |
        RELEASE_NOTES="release-notes/${VERSION}.md"
        if [ ! -s "$RELEASE_NOTES" ]; then
          echo "Release notes not found: $RELEASE_NOTES" >&2
          exit 1
        fi
        gh release create "$VERSION" --verify-tag --title "$VERSION" --notes-file "$RELEASE_NOTES" dist/*

  website-publish:
    if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/')
    needs:
    - github-publish
    - pypi-publish
    runs-on: ubuntu-24.04
    concurrency:
      group: website-publish
      cancel-in-progress: false
    permissions:
      contents: write
      pages: write
    steps:
    - name: Check latest stable release
      id: check_release
      env:
        GH_TOKEN: ${{ github.token }}
        VERSION: ${{ github.ref_name }}
      run: |
        set -euo pipefail

        LATEST_VERSION="$(
          gh api \
            --paginate \
            "repos/${GITHUB_REPOSITORY}/tags?per_page=100" \
            --jq '.[].name | select(test("^[0-9]+\\.[0-9]+\\.[0-9]+$"))' \
            | sort --version-sort \
            | tail --lines=1
        )"

        if [[ -z "${LATEST_VERSION}" ]]; then
          echo "No stable version tags found." >&2
          exit 1
        fi
        if [[ "${VERSION}" != "${LATEST_VERSION}" ]]; then
          echo "Skipping ${VERSION}; the latest version tag is ${LATEST_VERSION}."
          echo "publish=false" >> "${GITHUB_OUTPUT}"
          exit 0
        fi

        echo "publish=true" >> "${GITHUB_OUTPUT}"

    - name: Update website release
      if: steps.check_release.outputs.publish == 'true'
      id: update_website
      env:
        GH_TOKEN: ${{ github.token }}
        VERSION: ${{ github.ref_name }}
      run: |
        set -euo pipefail

        WEBSITE_PATH="_data/release.yml"
        WEBSITE_ENDPOINT="repos/${GITHUB_REPOSITORY}/contents/${WEBSITE_PATH}"
        ENCODED_CONTENT="$(printf 'version: %s\n' "${VERSION}" | base64 --wrap=0)"
        CURRENT_COMMIT="$(
          gh api \
            "repos/${GITHUB_REPOSITORY}/git/ref/heads/gh-pages" \
            --jq '.object.sha'
        )"
        CURRENT_FILE="$(gh api "${WEBSITE_ENDPOINT}?ref=${CURRENT_COMMIT}")"
        CURRENT_SHA="$(jq --raw-output '.sha' <<< "${CURRENT_FILE}")"
        CURRENT_CONTENT="$(
          jq --raw-output '.content' <<< "${CURRENT_FILE}" \
            | tr --delete '\n'
        )"

        if [[ "${CURRENT_CONTENT}" == "${ENCODED_CONTENT}" ]]; then
          WEBSITE_COMMIT="${CURRENT_COMMIT}"
          CONTENT_CHANGED=false
          echo "Website already advertises ${VERSION}."
        else
          WEBSITE_COMMIT="$(
            gh api \
              --method PUT \
              "${WEBSITE_ENDPOINT}" \
              --raw-field branch=gh-pages \
              --raw-field message="chore: publish website for ${VERSION}" \
              --raw-field content="${ENCODED_CONTENT}" \
              --raw-field sha="${CURRENT_SHA}" \
              --jq '.commit.sha'
          )"
          CONTENT_CHANGED=true
          echo "Updated website release to ${VERSION} in ${WEBSITE_COMMIT}."
        fi

        echo "content_changed=${CONTENT_CHANGED}" >> "${GITHUB_OUTPUT}"
        echo "website_commit=${WEBSITE_COMMIT}" >> "${GITHUB_OUTPUT}"

    - name: Check existing website build
      if: steps.update_website.outputs.content_changed == 'false'
      id: existing_build
      env:
        GH_TOKEN: ${{ github.token }}
        WEBSITE_COMMIT: ${{ steps.update_website.outputs.website_commit }}
      run: |
        set -euo pipefail

        BUILD="$(gh api "repos/${GITHUB_REPOSITORY}/pages/builds/latest")"
        BUILD_COMMIT="$(jq --raw-output '.commit' <<< "${BUILD}")"
        BUILD_STATUS="$(jq --raw-output '.status' <<< "${BUILD}")"
        BUILD_COMPLETE=false
        BUILD_URL=

        if [[ "${BUILD_COMMIT}" == "${WEBSITE_COMMIT}" ]]; then
          case "${BUILD_STATUS}" in
            built)
              BUILD_COMPLETE=true
              echo "Website build for ${WEBSITE_COMMIT} is already complete."
              ;;
            queued|building)
              BUILD_URL="$(jq --raw-output '.url' <<< "${BUILD}")"
              echo "Website build for ${WEBSITE_COMMIT} is ${BUILD_STATUS}."
              ;;
          esac
        fi

        echo "build_complete=${BUILD_COMPLETE}" >> "${GITHUB_OUTPUT}"
        echo "build_url=${BUILD_URL}" >> "${GITHUB_OUTPUT}"

    - name: Start website build
      if: >-
        steps.check_release.outputs.publish == 'true' &&
        steps.existing_build.outputs.build_complete != 'true' &&
        steps.existing_build.outputs.build_url == ''
      id: start_build
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        BUILD_URL="$(
          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/pages/builds" \
            --jq '.url'
        )"
        echo "build_url=${BUILD_URL}" >> "${GITHUB_OUTPUT}"

    - name: Wait for website build
      if: >-
        steps.check_release.outputs.publish == 'true' &&
        steps.existing_build.outputs.build_complete != 'true'
      env:
        BUILD_URL: ${{ steps.existing_build.outputs.build_url || steps.start_build.outputs.build_url }}
        GH_TOKEN: ${{ github.token }}
        WEBSITE_COMMIT: ${{ steps.update_website.outputs.website_commit }}
      run: |
        set -euo pipefail

        for _ in {1..60}; do
          BUILD="$(
            gh api \
              "${BUILD_URL}"
          )"
          BUILD_COMMIT="$(jq --raw-output '.commit' <<< "${BUILD}")"
          BUILD_STATUS="$(jq --raw-output '.status' <<< "${BUILD}")"
          if [[ "${BUILD_COMMIT}" != "${WEBSITE_COMMIT}" ]]; then
            echo "GitHub Pages built ${BUILD_COMMIT}, expected ${WEBSITE_COMMIT}." >&2
            exit 1
          fi
          case "${BUILD_STATUS}" in
            built)
              exit 0
              ;;
            errored)
              echo "GitHub Pages build for ${WEBSITE_COMMIT} failed." >&2
              exit 1
              ;;
          esac
          sleep 5
        done

        echo "Timed out waiting for GitHub Pages build ${WEBSITE_COMMIT}." >&2
        exit 1
