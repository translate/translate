name: Distribution

on:
  push:
    branches-ignore:
    - renovate/**
    - dependabot/**
    tags:
    - '*'
  pull_request:

permissions:
  contents: read

jobs:
  setup:

    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: 3.14
    - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: false
        version: 0.11.7
    - name: Install apt dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgettextpo-dev pandoc
    - name: Convert release notes
      if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/')
      env:
        VERSION: ${{ github.ref_name }}
      run: |
        RELEASE_NOTES="docs/releases/${VERSION}.rst"
        if [ ! -f "$RELEASE_NOTES" ]; then
          echo "Release notes not found: $RELEASE_NOTES" >&2
          exit 1
        fi
        mkdir -p release-notes
        pandoc --from rst --to gfm --output "release-notes/${VERSION}.md" "$RELEASE_NOTES"
    - name: Build package
      run: uv build
    - name: Twine check
      run: uvx twine check dist/*
    - name: pydistcheck
      run: uvx pydistcheck --inspect dist/*
    - name: pyroma
      run: uvx --with pip pyroma dist/*.tar.gz
    - name: check-wheel-contents
      run: uvx check-wheel-contents dist/*.whl
    - name: check-manifest
      run: uvx --with pip check-manifest -v
    - name: Install test (source)
      run: |
        uv venv test-ttk-release-src
        . ./test-ttk-release-src/bin/activate
        uv pip install dist/translate_toolkit-*.tar.gz
        moz2po --help
        python ./test-ttk-release-src/lib/python*/site-packages/translate/lang/identify.py README.rst
    - name: Install test (wheel)
      run: |
        uv venv test-ttk-release-whl
        . ./test-ttk-release-whl/bin/activate
        uv pip install dist/translate_toolkit*.whl
        moz2po --help
        python ./test-ttk-release-whl/lib/python*/site-packages/translate/lang/identify.py README.rst
    - uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
      with:
        name: setup
        token: ${{ secrets.CODECOV_TOKEN }} # zizmor: ignore[secrets-outside-env]
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        path: dist/*
        name: dist
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/')
      with:
        path: release-notes/*.md
        name: release-notes

  pypi-publish:
    if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/')
    needs:
    - setup
    runs-on: ubuntu-24.04
    permissions:
      # this permission is mandatory for trusted publishing
      id-token: write
    steps:
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: dist
        path: dist

    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  github-publish:
    if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/')
    needs:
    - setup
    runs-on: ubuntu-24.04
    permissions:
      # this permission is mandatory for creating a release
      contents: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: dist
        path: dist
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: release-notes
        path: release-notes
    - env:
        VERSION: ${{ github.ref_name }}
        GH_TOKEN: ${{ github.token }}
      run: |
        RELEASE_NOTES="release-notes/${VERSION}.md"
        if [ ! -s "$RELEASE_NOTES" ]; then
          echo "Release notes not found: $RELEASE_NOTES" >&2
          exit 1
        fi
        gh release create "$VERSION" --verify-tag --title "Translate Toolkit $VERSION" --notes-file "$RELEASE_NOTES" dist/*
