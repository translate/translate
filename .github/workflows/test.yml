name: Tests

on:
  push:
    branches-ignore:
    - renovate/**
    - dependabot/**
  pull_request:

permissions:
  contents: read

jobs:
  test:

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        requirements: [latest]
        python-version:
        - '3.11'
        - '3.12'
        - '3.13'
        - '3.14'
        os:
        - ubuntu-latest
        - windows-latest
        - macos-latest
        include:
        - requirements: minimal
          python-version: '3.11'
          os: ubuntu-latest

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      id: setup_python
      with:
        allow-prereleases: true
        python-version: ${{ matrix.python-version }}
    - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      with:
        cache-suffix: ${{ steps.setup_python.outputs.python-version }}
        version: 0.11.26
    - name: Install apt dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgettextpo-dev gettext hunspell-af
    - name: Install Windows dependencies
      if: matrix.os == 'windows-latest'
      run: |
        nuget install Gettext.Tools -Version 0.22.4 -OutputDirectory c:\nuget;
        Add-Content $env:GITHUB_PATH "C:\nuget\Gettext.Tools.0.22.4\tools\bin"
    - name: Minimalize deps
      if: matrix.requirements == 'minimal'
      run: sed -i '/^ *"/ s/>=/==/' pyproject.toml
    - name: Install pip dependencies
      run: uv sync --all-extras --dev
    - name: Generate phply parser tables
      run: |
        # `python -m phply.phpparse --generate` is a no-op because the module
        # does not call its main function.
        uv run phpparse --generate
        uv run python -c "import phply.parsetab as parsetab; assert hasattr(parsetab, '_tabversion'); print(f'Using {parsetab.__file__}')"
    - name: pytest
      run: make test
    - name: Coverage
      run: uv run coverage xml
    - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        name: ${{ runner.os }}, Python ${{ matrix.python-version }}, ${{ matrix.requirements }}
        token: ${{ secrets.CODECOV_TOKEN }} # zizmor: ignore[secrets-outside-env]
