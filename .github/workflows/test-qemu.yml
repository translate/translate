name: Qemu tests

on:
  push:
    branches-ignore:
    - renovate/**
    - dependabot/**
  pull_request:

permissions:
  contents: read


jobs:
  build_job:
    runs-on: ubuntu-24.04
    name: test (${{ matrix.arch }}, ${{ matrix.distro }})

    # Run steps on a matrix of 4 arch/distro combinations
    strategy:
      fail-fast: false
      matrix:
        include:
        - arch: s390x
          distro: ubuntu24.04
        - arch: ppc64le
          distro: ubuntu24.04
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0
      with:
        persist-credentials: false
    - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: /tmp/setup-uv-cache
        key: ${{ runner.os }}-qemu-uv-v1-${{ matrix.arch }}-${{ matrix.distro }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-qemu-uv-v1-${{ matrix.arch }}-${{ matrix.distro }}-
    - uses: uraimo/run-on-arch-action@f9b26e3a1a408d5fd530d20c17b9f3f4428ff8d9   # v3.1.0
      name: Test
      with:
        arch: ${{ matrix.arch }}
        distro: ${{ matrix.distro }}

        dockerRunArgs: |
          --volume "/tmp/setup-uv-cache:/tmp/setup-uv-cache"
          --tty=false

        install: |
          apt-get update -q -y
          apt-get install -q -y libgettextpo-dev gettext libxml2-dev libxslt1-dev zlib1g-dev gcc g++ tzdata
          curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR=/usr/local/bin sh

        run: |
          export UV_CACHE_DIR=/tmp/setup-uv-cache
          uv sync --group test --all-extras --no-dev
          source .venv/bin/activate
          # Generate phply parser tables before pytest-xdist starts workers.
          # `python -m phply.phpparse --generate` is a no-op because the module
          # does not call its main function.
          phpparse --generate
          python -c "import phply.parsetab as parsetab; assert hasattr(parsetab, '_tabversion'); print(f'Using {parsetab.__file__}')"
          # Native test jobs collect coverage; QEMU jobs focus on architecture coverage.
          pytest -r EfsxX -n auto --maxprocesses=4 --dist=worksteal
          uv cache prune --ci
