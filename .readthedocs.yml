version: 2

sphinx:
  configuration: docs/conf.py

# Optionally build your docs in additional formats such as PDF and ePub
formats: []

build:
  os: ubuntu-24.04
  tools:
    python: '3.14'
  apt_packages:
  - libgettextpo0

python:
  install:
  - method: uv
    command: sync
    groups:
    - docs
